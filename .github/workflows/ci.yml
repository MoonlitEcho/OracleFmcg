name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Prepare CI requirements
        run: python scripts/sanitize_requirements.py requirements.txt requirements-ci.txt --with-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Validate dependency conflicts
        run: python -m pip check

      - name: Lint (flake8)
        run: python -m flake8 api.py app.py tests --max-line-length=120 --extend-ignore=E203,W503 --exit-zero

      - name: Type check (optional)
        continue-on-error: true
        run: python -m mypy api.py --ignore-missing-imports

      - name: Run unit tests with coverage
        run: python -m pytest tests -q --cov=api --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository_owner }}/oraclefmcg-${{ matrix.target }}:${{ github.sha }}

  integration:
    runs-on: ubuntu-latest
    needs: [quality-and-tests, docker-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Backend health check failed"
          docker compose logs backend
          exit 1

      - name: Verify frontend and backend integration smoke checks
        run: |
          curl -fsS http://localhost:8000/health
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8501 > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Frontend health check failed"
          docker compose logs frontend
          exit 1

      - name: Stop services
        if: always()
        run: docker compose down -v

  docs:
    runs-on: ubuntu-latest
    needs: quality-and-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Prepare docs dependencies
        run: python scripts/sanitize_requirements.py requirements.txt requirements-docs.txt

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-docs.txt

      - name: Generate OpenAPI and markdown docs
        run: |
          mkdir -p site/api
          python - <<'PY'
          import json
          from pathlib import Path
          from api import app

          openapi_path = Path("site/api/openapi.json")
          openapi_path.write_text(json.dumps(app.openapi(), indent=2), encoding="utf-8")

          markdown = """# OracleFmcg Documentation

          ## API
          - OpenAPI specification is generated at `site/api/openapi.json`.

          ## Application Components
          - `api.py`: FastAPI backend for forecasting and insights.
          - `app.py`: Streamlit frontend dashboard for interactive forecasting.
          """
          Path("site/index.md").write_text(markdown, encoding="utf-8")
          PY

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site
